<!DOCTYPE html>
<html lang='en'>
    <head>
        <meta charset='utf-8'>
        <meta name='viewport' content='width=device-width'>
        <title>gratility</title>
        <link rel='stylesheet' type='text/css' href='gratility.css'></link>
        <script type='text/javascript' src='require.js'></script>
        <script type='text/javascript' src='gratility.js'></script>
        <script type='text/javascript'>requirejs(['main'])</script>
    </head>
    <body>

        <main>
            <section id='toolbar'>
                <div id='toolbox'>
                </div>
                <div style='flex:1'></div>
                <div id='importexport'>
                    <span class='menustate multisel' data-menu='iesel'><!--
                        --><button data-multisel='stamp'>current stamp</button><!--
                        --><button data-multisel='full'>full page</button><!--
                    --></span>
                    <br>
                    import:
                    <button class='menuaction' data-menu='ultxt'>text</button>
                    <button class='menuaction' data-menu='ulstamp'>file</button>
                    <input type='file' id='fileinput' style='display:none'>
                    <br>
                    export:
                    <button class='menuaction' data-menu='dltxt'>text</button>
                    <button class='menuaction' data-menu='dlstamp'>file</button>
                    <button class='menuaction' data-menu='dlsvg'>.svg</button>
                </div>
                <div id='filecont'>
                    <div class='menuaction' data-menu='file' id='file'>❗ not saving changes</div>
                    <div class='menuaction' data-menu='filesetting' id='filesetting'>⚙︎</div>
                </div>
                <div class='menuaction nc' data-menu='server' id='server'><span>server:
                    <span class='nc'>not connected</span>
                    <span class='c'>connected</span>
                    <span class='dc'>disconnected</span>
                </span><div></div></div>
            </section>
            <svg id='grid'>
                <!-- Filter+ from Dark Reader, https://github.com/darkreader/darkreader/blob/7f047b20909b09b8cdb3e45550d0c586abeb98a4/src/generators/utils/matrix.ts#L42 -->
                <filter id="invertFilter" x="0" y="0" width="999999" height="999999" style={"color-interpolation-filters": "srgb"}>
                <feColorMatrix type="matrix" values="0.33333 -0.66667 -0.66667 0 1 -0.66667 0.33333 -0.66667 0 1 -0.66667 -0.66667 0.33333 0 1 0 0 0 1 0"/>
                </filter>
            </svg>
        </main>

        <div id='menupopups'>

            <div data-menu='addtool'>
                <div class='page'>
                    <p><strong>binding</strong></p>
                    <div>
                        click, type, or scroll here:
                        <input class='menuinput' data-menu='binding' data-event='pointerdown=bindmouse;keydown=bindkey;wheel=bindwheel;paste=nop;contextmenu=nop'>
                    </div>
                    <p><strong>action</strong></p>
                    <div id='actions' class='actions menuinput big' data-menu='actions'></div>
                    <button class='menuinput' data-menu='go' data-event='click=go'>add</button>
                </div>
            </div>

            <div data-menu='ietool'>
                <textarea class='menuinput big' data-menu='value'></textarea>
                <button class='menuinput' data-menu='go' data-event='click=go'>import</button>
            </div>

            <div data-menu='server' class='small'>
                <label>username: <input class='menuinput' data-menu='username'></label>
                <label>password: <input class='menuinput' data-menu='password' type='password'></label>
                <div>
                    <button class='menuinput' data-menu='login' data-event='click=login'>login</button>
                    <button class='menuinput' data-menu='register' data-event='click=register'>register</button>
                </div>
            </div>

            <div data-menu='file' class='small'><div class='scroll'>
                <p>local files:</p>
                <label><input class='menuinput' data-menu='newlocaltitle' placeholder='enter title...'> <button class='menuinput' data-menu='newlocal' data-event='click=newlocal'>new local file</button></label>
                <div id='localfilelist' class='filelist'></div>
                <p>your server files:</p>
                <label><input class='menuinput' data-menu='newservertitle' placeholder='enter title...'> <button class='menuinput' data-menu='newserver' data-event='click=newserver'>new server file</button></label>
                <div id='serverfilelist' class='filelist'></div>
            </div></div>

            <div data-menu='filesetting' class='small'>
                <div></div>
            </div>

            <div data-menu='confirm' class='small'>
                <div id='confmsg'></div>
                <div id='confbtn'></div>
            </div>

        </div>

        <div id='alerts'></div>

    </body>
</html>
